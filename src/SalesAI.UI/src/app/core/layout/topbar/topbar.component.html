<header class="flex items-center justify-between px-6 py-4 bg-white border-b border-gray-200 shadow-sm">
  <div class="flex items-center">
    <!-- Search Bar -->
    <div class="relative">
      <span class="absolute inset-y-0 left-0 flex items-center pl-3">
        <mat-icon class="text-gray-400">search</mat-icon>
      </span>
      <input type="text" 
             class="w-full py-2 pl-10 pr-4 text-gray-700 bg-gray-50 border rounded-lg focus:outline-none focus:ring focus:border-blue-300" 
             placeholder="Search leads, deals, or contacts...">
    </div>
  </div>

  <div class="flex items-center gap-4">
    <button mat-icon-button class="text-gray-500 hover:text-gray-700">
      <mat-icon>notifications</mat-icon>
    </button>
    
    <button mat-icon-button [matMenuTriggerFor]="profileMenu" class="h-10 w-10 rounded-full bg-blue-600 text-white flex items-center justify-center font-bold">
      {{ userInitial }}
    </button>

    <mat-menu #profileMenu="matMenu">
      <button mat-menu-item>
        <mat-icon>account_circle</mat-icon>
        <span>Profile</span>
      </button>
      <button mat-menu-item>
        <mat-icon>settings</mat-icon>
        <span>Settings</span>
      </button>
    </mat-menu>
  </div>
</header>
