<div class="flex flex-col w-64 bg-surface-950 border-r border-surface-800">
  <div class="flex items-center px-6 h-16 border-b border-surface-800">
    <div class="flex items-center justify-center w-8 h-8 rounded bg-brand-600 text-white mr-3">
      <span class="material-symbols-outlined text-sm">auto_awesome</span>
    </div>
    <span class="text-white text-lg font-semibold tracking-tight">
      SalesAI
    </span>
  </div>
  <div class="flex flex-col flex-1 overflow-y-auto custom-scrollbar">
    <nav class="flex-1 px-3 py-6 space-y-1">
      <a *ngFor="let item of navItems" 
         [routerLink]="item.route" 
         routerLinkActive="bg-surface-800 text-white"
         [routerLinkActiveOptions]="{exact: false}"
         class="flex items-center px-3 py-2 text-surface-400 rounded-md hover:bg-surface-800 hover:text-white transition-all duration-200 group text-sm">
        <span class="material-symbols-outlined mr-3 text-[20px] group-hover:text-brand-400 transition-colors">{{ item.icon }}</span>
        <span class="font-medium">{{ item.label }}</span>
      </a>
    </nav>
  </div>
  <div class="p-3 border-t border-surface-800">
    <button (click)="logout()" class="flex items-center w-full px-3 py-2 text-surface-400 rounded-md hover:bg-surface-800 hover:text-white transition-all duration-200 group text-sm">
      <span class="material-symbols-outlined mr-3 text-[20px] group-hover:text-red-400 transition-colors">logout</span>
      <span class="font-medium">Logout</span>
    </button>
  </div>
</div>
