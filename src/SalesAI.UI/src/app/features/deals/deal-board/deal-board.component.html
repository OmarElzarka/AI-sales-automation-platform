<div class="h-full flex flex-col space-y-6">
  <div class="flex items-center justify-between">
    <div>
      <h1 class="text-2xl font-bold text-surface-900 tracking-tight">Deals Pipeline</h1>
      <p class="text-sm text-surface-500 mt-1">Drag and drop to update deal stages</p>
    </div>
    <button class="btn-primary" (click)="openNewDealModal()">
      <span class="material-symbols-outlined text-[18px] mr-2">add</span> New Deal
    </button>
  </div>

  <div *ngIf="loading" class="flex justify-center p-12">
    <div class="animate-spin rounded-full h-10 w-10 border-b-2 border-brand-600"></div>
  </div>

  <!-- Kanban Board -->
  <div *ngIf="!loading" class="flex-1 flex overflow-x-auto space-x-6 pb-4 scrollbar-thin scrollbar-thumb-surface-300 scrollbar-track-transparent" cdkDropListGroup>
    
    <div *ngFor="let col of columns" class="flex flex-col w-[320px] flex-shrink-0 bg-surface-50 rounded-xl border border-surface-200 overflow-hidden shadow-sm">
      
      <!-- Column Header -->
      <div class="p-4 border-b border-surface-200 flex justify-between items-center bg-surface-100/50 relative overflow-hidden">
        <div class="absolute left-0 top-0 bottom-0 w-1 bg-brand-500"></div>
        <h3 class="font-bold text-surface-800 tracking-tight pl-2">{{ col.title }}</h3>
        <span class="text-xs font-bold px-2.5 py-1 rounded-md bg-surface-200 text-surface-700 shadow-sm">{{ col.deals.length }}</span>
      </div>

      <!-- Drop Zone -->
      <div 
        cdkDropList
        [cdkDropListData]="col.deals"
        (cdkDropListDropped)="drop($event)"
        class="flex-1 p-3 space-y-3 overflow-y-auto min-h-[200px] scrollbar-thin scrollbar-thumb-surface-300 scrollbar-track-transparent">
        
        <!-- Deal Card -->
        <div *ngFor="let deal of col.deals" cdkDrag class="bg-white p-4 rounded-lg border border-surface-200 shadow-sm cursor-grab active:cursor-grabbing hover:border-brand-300 hover:shadow-md transition-all group relative overflow-hidden">
          
          <div class="flex justify-between items-start mb-2">
            <h4 class="font-semibold text-surface-900 leading-tight pr-6">{{ deal.title }}</h4>
            <button class="absolute right-2 top-2 h-6 w-6 flex items-center justify-center text-surface-400 hover:text-surface-700 hover:bg-surface-50 rounded transition-colors opacity-0 group-hover:opacity-100">
              <span class="material-symbols-outlined text-[18px]">more_vert</span>
            </button>
          </div>
          
          <p class="text-[15px] font-bold text-brand-700 mb-3">${{ deal.value | number }}</p>
          
          <div class="flex items-center text-xs text-surface-500 mb-4 font-medium">
            <span class="material-symbols-outlined text-[14px] mr-1.5 text-surface-400">business</span>
            {{ deal.companyName }}
          </div>

          <!-- Footer: Contact & AI Score -->
          <div class="border-t border-surface-100 pt-3 flex justify-between items-center">
            <div class="flex items-center gap-2">
              <div class="h-6 w-6 rounded-full bg-surface-100 text-surface-700 border border-surface-200 flex items-center justify-center text-[10px] font-bold shadow-sm">
                {{ deal.contactName[0] }}
              </div>
              <span class="text-xs text-surface-600 font-medium">{{ deal.contactName }}</span>
            </div>
            
            <div class="flex items-center gap-2">
              <button class="inline-flex items-center gap-1 px-2 py-1 rounded bg-indigo-50 text-indigo-700 border border-indigo-200 shadow-sm hover:bg-indigo-100" title="Summarize Meeting" (click)="summarizeMeeting(deal)">
                <span class="material-symbols-outlined text-[12px]">summarize</span>
                <span class="text-[11px] font-bold">Summary</span>
              </button>
              <div class="inline-flex items-center gap-1 px-2 py-1 rounded bg-emerald-50 text-emerald-700 border border-emerald-200 shadow-sm" title="AI Win Probability">
                <span class="material-symbols-outlined text-[12px]">auto_awesome</span>
                <span class="text-[11px] font-bold">{{ deal.aiProbability }}%</span>
              </div>
            </div>
          </div>
          
        </div>

      </div>
    </div>

  </div>
  
  <!-- New Deal Modal -->
  <div *ngIf="showNewDealModal" class="fixed inset-0 z-50 flex items-center justify-center bg-surface-900/50 backdrop-blur-sm transition-opacity">
    <div class="bg-white rounded-xl shadow-2xl w-full max-w-lg overflow-hidden flex flex-col border border-surface-200">
      <div class="p-6 border-b border-surface-200 flex justify-between items-center bg-surface-50">
        <h3 class="text-xl font-bold text-surface-900">Create New Deal</h3>
        <button class="text-surface-400 hover:text-surface-600 transition-colors" (click)="closeNewDealModal()">
          <span class="material-symbols-outlined">close</span>
        </button>
      </div>
      
      <div class="p-6 space-y-4">
        <div>
          <label class="block text-sm font-medium text-surface-700 mb-1">Title *</label>
          <input type="text" [(ngModel)]="newDeal.title" class="input-field" placeholder="Enterprise License">
        </div>
        <div class="grid grid-cols-2 gap-4">
          <div>
            <label class="block text-sm font-medium text-surface-700 mb-1">Value *</label>
            <input type="number" [(ngModel)]="newDeal.value" class="input-field" placeholder="10000">
          </div>
          <div>
            <label class="block text-sm font-medium text-surface-700 mb-1">Currency</label>
            <select [(ngModel)]="newDeal.currency" class="input-field">
              <option value="USD">USD</option>
              <option value="EUR">EUR</option>
              <option value="GBP">GBP</option>
            </select>
          </div>
        </div>
        <div class="grid grid-cols-2 gap-4">
          <div>
            <label class="block text-sm font-medium text-surface-700 mb-1">Stage</label>
            <select [(ngModel)]="newDeal.stage" class="input-field">
              <option value="NewLead">New Lead</option>
              <option value="Qualified">Qualified</option>
              <option value="Proposal">Proposal</option>
              <option value="Negotiation">Negotiation</option>
            </select>
          </div>
          <div>
            <label class="block text-sm font-medium text-surface-700 mb-1">Probability (%)</label>
            <input type="number" [(ngModel)]="newDeal.probability" class="input-field" placeholder="50">
          </div>
        </div>
      </div>
      
      <div class="p-6 border-t border-surface-200 bg-surface-50 flex justify-end gap-3">
        <button class="btn-secondary" (click)="closeNewDealModal()" [disabled]="submitting">Cancel</button>
        <button class="btn-primary" (click)="submitNewDeal()" [disabled]="submitting">
          <span class="material-symbols-outlined text-[18px] mr-2" [class.animate-spin]="submitting">{{ submitting ? 'refresh' : 'check' }}</span>
          {{ submitting ? 'Creating...' : 'Create Deal' }}
        </button>
      </div>
    </div>
  </div>
</div>
