<div class="h-full flex flex-col space-y-6">
  <div class="flex items-center justify-between">
    <div>
      <h1 class="text-2xl font-semibold text-gray-900">Deals Pipeline</h1>
      <p class="text-sm text-gray-500 mt-1">Drag and drop to update deal stages</p>
    </div>
    <button mat-flat-button color="primary">
      <mat-icon>add</mat-icon> New Deal
    </button>
  </div>

  <div *ngIf="loading" class="flex justify-center p-12">
    <div class="animate-spin rounded-full h-8 w-8 border-b-2 border-blue-600"></div>
  </div>

  <!-- Kanban Board -->
  <div *ngIf="!loading" class="flex-1 flex overflow-x-auto space-x-6 pb-4" cdkDropListGroup>
    
    <div *ngFor="let col of columns" class="flex flex-col w-80 flex-shrink-0 bg-gray-50 rounded-xl border border-gray-200">
      
      <!-- Column Header -->
      <div class="p-4 border-b border-gray-200 flex justify-between items-center bg-gray-100 rounded-t-xl">
        <h3 class="font-bold text-gray-700">{{ col.title }}</h3>
        <span class="text-xs font-semibold px-2.5 py-0.5 rounded-full bg-gray-200 text-gray-600">{{ col.deals.length }}</span>
      </div>

      <!-- Drop Zone -->
      <div 
        cdkDropList
        [cdkDropListData]="col.deals"
        (cdkDropListDropped)="drop($event)"
        class="flex-1 p-3 space-y-3 overflow-y-auto min-h-[200px]">
        
        <!-- Deal Card -->
        <mat-card *ngFor="let deal of col.deals" cdkDrag class="cursor-grab active:cursor-grabbing hover:shadow-md transition-shadow">
          <div class="p-4">
            <div class="flex justify-between items-start mb-2">
              <h4 class="font-medium text-gray-900">{{ deal.title }}</h4>
              <button mat-icon-button class="h-6 w-6 !leading-none text-gray-400 hover:text-gray-600">
                <mat-icon class="text-sm">more_vert</mat-icon>
              </button>
            </div>
            
            <p class="text-sm font-semibold text-gray-800 mb-3">${{ deal.value | number }}</p>
            
            <div class="flex items-center text-xs text-gray-500 mb-3">
              <mat-icon class="text-xs mr-1">business</mat-icon>
              {{ deal.companyName }}
            </div>

            <!-- AI Probability Badge -->
            <div class="border-t border-gray-100 pt-3 mt-1 flex justify-between items-center">
              <div class="flex items-center gap-2">
                <div class="h-6 w-6 rounded-full bg-blue-100 text-blue-600 flex items-center justify-center text-xs font-bold">
                  {{ deal.contactName[0] }}
                </div>
                <span class="text-xs text-gray-600">{{ deal.contactName }}</span>
              </div>
              <span class="inline-flex items-center gap-1 text-xs font-bold px-2 py-1 rounded bg-green-50 text-green-700 border border-green-200">
                <mat-icon class="text-[12px] h-[12px] w-[12px]">auto_awesome</mat-icon>
                {{ deal.aiProbability }}% Win
              </span>
            </div>
          </div>
        </mat-card>

      </div>
    </div>

  </div>
</div>
