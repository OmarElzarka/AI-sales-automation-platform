<div class="space-y-6">
  <div class="flex items-center justify-between">
    <h1 class="text-2xl font-semibold text-gray-900">Leads</h1>
    <button mat-flat-button color="primary">
      <mat-icon>add</mat-icon> New Lead
    </button>
  </div>

  <div class="bg-white shadow-sm rounded-lg border border-gray-200 overflow-hidden">
    <div class="p-4 border-b border-gray-200 flex items-center justify-between bg-gray-50">
      <mat-form-field appearance="outline" class="w-1/3">
        <mat-label>Search Leads</mat-label>
        <mat-icon matPrefix>search</mat-icon>
        <input matInput placeholder="Search by name, email, or company">
      </mat-form-field>
      <div class="flex gap-2">
        <button mat-stroked-button><mat-icon>filter_list</mat-icon> Filter</button>
        <button mat-stroked-button><mat-icon>upload_file</mat-icon> Import CSV</button>
      </div>
    </div>

    <div *ngIf="loading" class="flex justify-center p-12">
      <div class="animate-spin rounded-full h-8 w-8 border-b-2 border-blue-600"></div>
    </div>

    <table *ngIf="!loading" mat-table [dataSource]="dataSource" class="w-full">

      <!-- Name Column -->
      <ng-container matColumnDef="name">
        <th mat-header-cell *matHeaderCellDef class="text-xs font-medium text-gray-500 uppercase tracking-wider">Name</th>
        <td mat-cell *matCellDef="let lead" class="font-medium text-gray-900">
          {{lead.firstName}} {{lead.lastName}}
        </td>
      </ng-container>

      <!-- Company Column -->
      <ng-container matColumnDef="company">
        <th mat-header-cell *matHeaderCellDef class="text-xs font-medium text-gray-500 uppercase tracking-wider">Company</th>
        <td mat-cell *matCellDef="let lead" class="text-gray-500">{{lead.companyName || '--'}}</td>
      </ng-container>

      <!-- Email Column -->
      <ng-container matColumnDef="email">
        <th mat-header-cell *matHeaderCellDef class="text-xs font-medium text-gray-500 uppercase tracking-wider">Email</th>
        <td mat-cell *matCellDef="let lead" class="text-gray-500">{{lead.email}}</td>
      </ng-container>

      <!-- Status Column -->
      <ng-container matColumnDef="status">
        <th mat-header-cell *matHeaderCellDef class="text-xs font-medium text-gray-500 uppercase tracking-wider">Status</th>
        <td mat-cell *matCellDef="let lead">
          <span class="px-2 inline-flex text-xs leading-5 font-semibold rounded-full" [ngClass]="getStatusColor(lead.status)">
            {{lead.status}}
          </span>
        </td>
      </ng-container>

      <!-- Score Column -->
      <ng-container matColumnDef="score">
        <th mat-header-cell *matHeaderCellDef class="text-xs font-medium text-gray-500 uppercase tracking-wider">AI Score</th>
        <td mat-cell *matCellDef="let lead">
          <div class="flex items-center gap-2">
            <span class="px-2 inline-flex text-xs leading-5 font-semibold rounded-full" [ngClass]="getScoreColor(lead.scoreCategory)">
              {{lead.scoreCategory}}
            </span>
            <span class="text-sm font-bold text-gray-700">{{lead.scoreNumeric}}</span>
          </div>
        </td>
      </ng-container>

      <!-- Actions Column -->
      <ng-container matColumnDef="actions">
        <th mat-header-cell *matHeaderCellDef class="text-right text-xs font-medium text-gray-500 uppercase tracking-wider">Actions</th>
        <td mat-cell *matCellDef="let lead" class="text-right">
          <button mat-icon-button color="primary" [routerLink]="['/leads', lead.id]">
            <mat-icon>chevron_right</mat-icon>
          </button>
        </td>
      </ng-container>

      <tr mat-header-row *matHeaderRowDef="displayedColumns" class="bg-gray-50"></tr>
      <tr mat-row *matRowDef="let row; columns: displayedColumns;" class="hover:bg-gray-50 cursor-pointer transition-colors duration-150" [routerLink]="['/leads', row.id]"></tr>
    </table>
    
    <mat-paginator [pageSizeOptions]="[10, 25, 50]" showFirstLastButtons class="border-t border-gray-200"></mat-paginator>
  </div>
</div>
