<div class="max-w-5xl mx-auto space-y-6 h-[calc(100vh-8rem)] flex flex-col pb-6">
  <div class="flex items-center justify-between">
    <h1 class="text-2xl font-bold text-surface-900 tracking-tight">Email Outreach</h1>
  </div>

  <div class="flex flex-col md:flex-row gap-6 flex-1 min-h-0">
    <!-- Left Panel: AI Assistant -->
    <div class="w-full md:w-1/3 flex flex-col">
      <div class="card p-6 bg-gradient-to-br from-indigo-50 to-white border-indigo-100 flex-1 flex flex-col relative overflow-hidden group">
        <div class="absolute -right-6 -top-6 text-indigo-100 opacity-30 transform rotate-12 transition-transform duration-700 group-hover:rotate-45 group-hover:scale-110 pointer-events-none">
          <span class="material-symbols-outlined text-9xl">smart_toy</span>
        </div>
        
        <div class="relative z-10 flex flex-col h-full">
          <div class="flex items-center gap-2 mb-4">
            <div class="h-8 w-8 rounded-lg bg-indigo-100 text-indigo-600 flex items-center justify-center shadow-sm border border-indigo-200">
              <span class="material-symbols-outlined text-[18px]">smart_toy</span>
            </div>
            <h2 class="text-lg font-bold text-surface-900 tracking-tight">AI Composer</h2>
          </div>
          
          <p class="text-sm text-surface-600 mb-8 leading-relaxed">Let SalesAI draft the perfect personalized email based on lead history and web data.</p>
          
          <div class="space-y-6 mt-auto">
            <div>
              <label class="block text-[11px] font-bold text-surface-500 uppercase tracking-widest mb-3">Select Tone</label>
              <div class="flex flex-wrap gap-2">
                <button class="px-4 py-2 text-xs font-semibold rounded-md border transition-all shadow-sm focus:outline-none"
                        [ngClass]="emailForm.get('tone')?.value === 'professional' ? 'bg-indigo-600 text-white border-indigo-600 shadow-indigo-200 ring-2 ring-indigo-100 ring-offset-1' : 'bg-white text-surface-700 border-surface-200 hover:bg-surface-50 hover:border-surface-300'"
                        (click)="setTone('professional')">Professional</button>
                <button class="px-4 py-2 text-xs font-semibold rounded-md border transition-all shadow-sm focus:outline-none"
                        [ngClass]="emailForm.get('tone')?.value === 'casual' ? 'bg-indigo-600 text-white border-indigo-600 shadow-indigo-200 ring-2 ring-indigo-100 ring-offset-1' : 'bg-white text-surface-700 border-surface-200 hover:bg-surface-50 hover:border-surface-300'"
                        (click)="setTone('casual')">Casual</button>
                <button class="px-4 py-2 text-xs font-semibold rounded-md border transition-all shadow-sm focus:outline-none"
                        [ngClass]="emailForm.get('tone')?.value === 'direct' ? 'bg-indigo-600 text-white border-indigo-600 shadow-indigo-200 ring-2 ring-indigo-100 ring-offset-1' : 'bg-white text-surface-700 border-surface-200 hover:bg-surface-50 hover:border-surface-300'"
                        (click)="setTone('direct')">Direct</button>
              </div>
            </div>
            
            <button class="w-full btn-primary py-3 flex items-center justify-center text-sm shadow-md transition-all disabled:opacity-70 disabled:cursor-not-allowed" (click)="generateAIEmail()" [disabled]="generating">
              <span *ngIf="!generating" class="material-symbols-outlined mr-2 text-[18px]">auto_awesome</span>
              <span *ngIf="generating" class="material-symbols-outlined animate-spin mr-2 text-[18px]">progress_activity</span>
              {{ generating ? 'Generating...' : 'Draft with AI' }}
            </button>
          </div>
        </div>
      </div>
    </div>

    <!-- Right Panel: Email Form -->
    <div class="w-full md:w-2/3 flex flex-col min-h-[500px]">
      <div class="card p-0 flex-1 flex flex-col overflow-hidden shadow-sm border-surface-200 bg-white relative">
        <form [formGroup]="emailForm" class="flex flex-col h-full absolute inset-0">
          <!-- Header inputs -->
          <div class="px-6 py-4 border-b border-surface-100 space-y-3 bg-surface-50/50">
            <div class="flex items-center">
              <span class="text-sm font-semibold text-surface-500 w-16 tracking-wide">To:</span>
              <input type="text" formControlName="to" class="flex-1 bg-transparent border-none focus:ring-0 p-0 text-sm text-surface-900 font-medium placeholder:text-surface-300 placeholder:font-normal" placeholder="john@acme.com">
            </div>
            <div class="w-full h-px bg-surface-100 ml-16"></div>
            <div class="flex items-center">
              <span class="text-sm font-semibold text-surface-500 w-16 tracking-wide">Subject:</span>
              <input type="text" formControlName="subject" class="flex-1 bg-transparent border-none focus:ring-0 p-0 text-sm text-surface-900 font-semibold placeholder:text-surface-300 placeholder:font-normal" placeholder="Brief and catchy subject...">
            </div>
          </div>
          
          <!-- Body -->
          <div class="flex-1 p-6 relative">
            <div *ngIf="generating" class="absolute inset-0 bg-white/70 backdrop-blur-sm z-10 flex flex-col items-center justify-center">
              <div class="flex flex-col items-center p-6 bg-white rounded-xl shadow-lg border border-indigo-100">
                <span class="material-symbols-outlined text-indigo-500 text-4xl mb-3 animate-bounce">smart_toy</span>
                <p class="text-indigo-700 font-bold tracking-tight">AI is crafting your message...</p>
                <p class="text-indigo-500 text-xs mt-1">Analyzing context and personalizing tone</p>
              </div>
            </div>
            <textarea formControlName="body" class="w-full h-full resize-none border-none focus:ring-0 p-0 text-[15px] leading-relaxed text-surface-800 placeholder:text-surface-300" placeholder="Write your message here..."></textarea>
          </div>
          
          <!-- Footer -->
          <div class="px-6 py-3 bg-surface-50 border-t border-surface-200 flex items-center justify-between mt-auto">
            <div class="flex space-x-1">
              <button type="button" class="h-8 w-8 flex items-center justify-center rounded text-surface-500 hover:text-surface-800 hover:bg-surface-200 transition-colors" title="Bold">
                <span class="material-symbols-outlined text-[18px]">format_bold</span>
              </button>
              <button type="button" class="h-8 w-8 flex items-center justify-center rounded text-surface-500 hover:text-surface-800 hover:bg-surface-200 transition-colors" title="Italic">
                <span class="material-symbols-outlined text-[18px]">format_italic</span>
              </button>
              <div class="w-px h-5 bg-surface-300 mx-1 self-center"></div>
              <button type="button" class="h-8 w-8 flex items-center justify-center rounded text-surface-500 hover:text-surface-800 hover:bg-surface-200 transition-colors" title="Insert Link">
                <span class="material-symbols-outlined text-[18px]">link</span>
              </button>
            </div>
            <button class="btn-primary py-2 px-6 flex items-center disabled:opacity-50 disabled:cursor-not-allowed" (click)="sendEmail()" [disabled]="emailForm.invalid || sending || generating">
              {{ sending ? 'Sending...' : 'Send Message' }} 
              <span class="material-symbols-outlined ml-2 text-[16px]">send</span>
            </button>
          </div>
        </form>
      </div>
    </div>
  </div>
</div>
