<div class="max-w-4xl mx-auto space-y-6 h-full flex flex-col">
  <div class="flex items-center justify-between">
    <h1 class="text-2xl font-semibold text-gray-900">Email Outreach</h1>
  </div>

  <div class="flex gap-6 flex-1 h-full">
    <!-- Left Panel: AI Assistant -->
    <div class="w-1/3 flex flex-col space-y-4">
      <mat-card class="p-5 rounded-xl shadow-sm border border-gray-200 bg-gradient-to-b from-indigo-50 to-white flex-1">
        <div class="flex items-center gap-2 mb-4">
          <mat-icon class="text-indigo-600">smart_toy</mat-icon>
          <h2 class="text-lg font-bold text-gray-900">AI Composer</h2>
        </div>
        
        <p class="text-sm text-gray-600 mb-6">Let SalesAI draft the perfect personalized email based on lead history and web data.</p>
        
        <div class="space-y-4">
          <div>
            <label class="block text-xs font-bold text-gray-700 uppercase tracking-wider mb-2">Select Tone</label>
            <div class="flex flex-wrap gap-2">
              <button class="px-3 py-1.5 text-xs font-medium rounded-full border transition-colors"
                      [ngClass]="emailForm.get('tone')?.value === 'professional' ? 'bg-indigo-600 text-white border-indigo-600' : 'bg-white text-gray-700 border-gray-300 hover:bg-gray-50'"
                      (click)="setTone('professional')">Professional</button>
              <button class="px-3 py-1.5 text-xs font-medium rounded-full border transition-colors"
                      [ngClass]="emailForm.get('tone')?.value === 'casual' ? 'bg-indigo-600 text-white border-indigo-600' : 'bg-white text-gray-700 border-gray-300 hover:bg-gray-50'"
                      (click)="setTone('casual')">Casual</button>
              <button class="px-3 py-1.5 text-xs font-medium rounded-full border transition-colors"
                      [ngClass]="emailForm.get('tone')?.value === 'direct' ? 'bg-indigo-600 text-white border-indigo-600' : 'bg-white text-gray-700 border-gray-300 hover:bg-gray-50'"
                      (click)="setTone('direct')">Direct</button>
            </div>
          </div>
          
          <button mat-flat-button color="primary" class="w-full mt-4 !py-2" (click)="generateAIEmail()" [disabled]="generating">
            <mat-icon *ngIf="!generating">auto_awesome</mat-icon>
            <span *ngIf="generating" class="animate-spin mr-2"><mat-icon>refresh</mat-icon></span>
            {{ generating ? 'Generating...' : 'Draft with AI' }}
          </button>
        </div>
      </mat-card>
    </div>

    <!-- Right Panel: Email Form -->
    <div class="w-2/3 flex flex-col h-full">
      <mat-card class="p-0 rounded-xl shadow-sm border border-gray-200 flex-1 flex flex-col overflow-hidden">
        <form [formGroup]="emailForm" class="flex flex-col h-full">
          <!-- Header inputs -->
          <div class="px-6 pt-6 pb-2 border-b border-gray-100 space-y-4">
            <div class="flex items-center">
              <span class="text-sm font-medium text-gray-500 w-16">To:</span>
              <input type="text" formControlName="to" class="flex-1 border-none focus:ring-0 p-0 text-sm" placeholder="john@acme.com">
            </div>
            <div class="flex items-center">
              <span class="text-sm font-medium text-gray-500 w-16">Subject:</span>
              <input type="text" formControlName="subject" class="flex-1 border-none focus:ring-0 p-0 text-sm font-medium" placeholder="Brief and catchy subject...">
            </div>
          </div>
          
          <!-- Body -->
          <div class="flex-1 p-6 relative">
            <div *ngIf="generating" class="absolute inset-0 bg-white/50 backdrop-blur-sm z-10 flex flex-col items-center justify-center">
              <div class="animate-pulse flex flex-col items-center">
                <mat-icon class="text-indigo-500 text-4xl mb-2">smart_toy</mat-icon>
                <p class="text-indigo-600 font-medium">AI is crafting your message...</p>
              </div>
            </div>
            <textarea formControlName="body" class="w-full h-full resize-none border-none focus:ring-0 p-0 text-sm leading-relaxed text-gray-800" placeholder="Write your message here..."></textarea>
          </div>
          
          <!-- Footer -->
          <div class="px-6 py-4 bg-gray-50 border-t border-gray-200 flex items-center justify-between">
            <div class="flex space-x-2">
              <button type="button" mat-icon-button class="text-gray-500 hover:text-gray-700">
                <mat-icon>format_bold</mat-icon>
              </button>
              <button type="button" mat-icon-button class="text-gray-500 hover:text-gray-700">
                <mat-icon>format_italic</mat-icon>
              </button>
              <button type="button" mat-icon-button class="text-gray-500 hover:text-gray-700">
                <mat-icon>link</mat-icon>
              </button>
            </div>
            <button mat-flat-button color="primary" class="px-8" (click)="sendEmail()" [disabled]="emailForm.invalid || sending || generating">
              {{ sending ? 'Sending...' : 'Send' }} <mat-icon class="ml-1 text-sm">send</mat-icon>
            </button>
          </div>
        </form>
      </mat-card>
    </div>
  </div>
</div>
