version: '3.8'

services:
  salesai-api:
    build:
      context: .
      dockerfile: src/SalesAI.API/Dockerfile
    ports:
      - "5000:8080"
    environment:
      - ASPNETCORE_ENVIRONMENT=Development
      - ConnectionStrings__DefaultConnection=Server=sqlserver;Database=SalesAI;User=sa;Password=SalesAI_Dev_2026!;TrustServerCertificate=true
      - JwtSettings__Secret=SalesAI-Super-Secret-Key-For-Development-Must-Be-At-Least-32-Chars!
      - GeminiApi__ApiKey=${GEMINI_API_KEY}
    depends_on:
      sqlserver:
        condition: service_healthy
    networks:
      - salesai-network

  sqlserver:
    image: mcr.microsoft.com/mssql/server:2022-latest
    environment:
      - ACCEPT_EULA=Y
      - SA_PASSWORD=SalesAI_Dev_2026!
      - MSSQL_PID=Developer
    ports:
      - "14330:1433"
    volumes:
      - sqlserver-data:/var/opt/mssql
    healthcheck:
      test: /opt/mssql-tools18/bin/sqlcmd -S localhost -U sa -P "SalesAI_Dev_2026!" -Q "SELECT 1" -C -b
      interval: 10s
      timeout: 5s
      retries: 5
    networks:
      - salesai-network

  redis:
    image: redis:7-alpine
    ports:
      - "6379:6379"
    volumes:
      - redis-data:/data
    networks:
      - salesai-network

  rabbitmq:
    image: rabbitmq:3-management-alpine
    ports:
      - "25672:5672" # AMQP protocol port
      - "15672:15672" # Management UI
    environment:
      - RABBITMQ_DEFAULT_USER=guest
      - RABBITMQ_DEFAULT_PASS=guest
    volumes:
      - rabbitmq-data:/var/lib/rabbitmq
    networks:
      - salesai-network

  wigolo:
    image: ghcr.io/knockoutez/wigolo
    command: serve --host 0.0.0.0
    environment:
      - WIGOLO_API_TOKEN=WigoloSecret2026
    ports:
      - "3333:3333"
    volumes:
      - wigolo-data:/data
    networks:
      - salesai-network

volumes:
  sqlserver-data:
  redis-data:
  rabbitmq-data:
  wigolo-data:

networks:
  salesai-network:
    driver: bridge
